services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: amakaziwatch
      POSTGRES_USER: amakaziwatch_user
      POSTGRES_PASSWORD: amakaziwatch_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U amakaziwatch_user -d amakaziwatch"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://amakaziwatch_user:amakaziwatch_password@db:5432/amakaziwatch
      - SECRET_KEY=${SECRET_KEY:-django-insecure-change-me}
      - DEBUG=${DEBUG:-True}
      - ALLOWED_HOSTS=localhost,127.0.0.1
      - ENVIRONMENT=development
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/staticfiles
      - /app/media

volumes:
  postgres_data: