version: '3.8'

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: amakaziwatch
      POSTGRES_USER: amakaziwatch_user
      POSTGRES_PASSWORD: amakaziwatch_password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  backend:
    build: .
    command: gunicorn amakaziwatch.wsgi:application --bind 0.0.0.0:8000
    environment:
      DATABASE_URL: postgresql://amakaziwatch_user:amakaziwatch_password@db:5432/amakaziwatch
      SECRET_KEY: ${SECRET_KEY:-django-insecure-change-me}
      DEBUG: ${DEBUG:-True}
      ALLOWED_HOSTS: localhost,127.0.0.1,amakazi-watch.onrender.com
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:3000
    ports:
      - "8000:8000"
    depends_on:
      - db
    volumes:
      - ./staticfiles:/app/staticfiles
      - ./media:/app/media

  frontend:
    build: ../Amakazi-watch-frontend  # Adjust path to your frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000/api
    depends_on:
      - backend
    volumes:
      - ../Amakazi-watch-frontend:/app
      - /app/node_modules

volumes:
  postgres_data:
