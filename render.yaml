services:
  - type: web
    name: amakazi-watch
    runtime: python
    plan: free
    buildCommand: |
      pip install -r requirements.txt
      python manage.py collectstatic --noinput
      python manage.py migrate --noinput
    startCommand: |
      gunicorn amakaziwatch.wsgi:application --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    # Remove or comment out healthCheckPath to disable it
    # healthCheckPath: /api/health/
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.0
      - key: DATABASE_URL
        fromDatabase:
          name: amakazi-watch-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: DJANGO_SETTINGS_MODULE
        value: amakaziwatch.settings
      - key: CORS_ALLOWED_ORIGINS
        value: https://amakazi-watch.onrender.com
      - key: ENVIRONMENT
        value: production

databases:
  - name: amakazi-watch-db
    plan: free
